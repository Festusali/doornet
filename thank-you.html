    <!-- START Purchase Tracking + WhatsApp Redirect -->
    <script>
        (function () {
            /**
             * Redirect WhatsApp orders after tracking has completed.
             */
            function redirectToWhatsApp(orderId) {
                const pendingOrder = sessionStorage.getItem('pendingWhatsappOrder');

                if (!pendingOrder) {
                    return;
                }

                const order = JSON.parse(pendingOrder);
                const message =
                    `Hello, I placed an order for "${order.product}".
    
Order ID: ${orderId}

Full Name: ${order.fullname}
Email: ${order.email}
Phone Number: ${order.phone}
Alternative Phone: ${order.altPhone}
Quantity: ${order.quantity}
Amount: ${order.price}
State: ${order.state}
Delivery Address: ${order.address}`;

                // Prevent duplicate WhatsApp redirects
                sessionStorage.removeItem('pendingWhatsappOrder');

                window.location.replace(
                    'https://wa.me/2347067868317?text=' +
                    encodeURIComponent(message)
                );
            }

            window.addEventListener('load', function () {
                // Give Meta & TikTok pixels time to finish loading
                setTimeout(function () {
                    const params = new URLSearchParams(window.location.search);

                    const orderId = params.get('order_id');
                    const price = Number(params.get('price')) || 25000;
                    const quantity = Number(params.get('quantity')) || 1;

                    console.log("Order ID:", orderId);
                    console.log("Price:", price);
                    console.log("Quantity:", quantity);

                    // Nothing to track without an order ID
                    if (!orderId) {
                        console.log("No order ID found.");
                        redirectToWhatsApp('');
                        return;
                    }

                    const trackingKey = `purchase_tracked_${orderId}`;

                    if (!sessionStorage.getItem(trackingKey)) {
                        console.log("Tracking purchase...");

                        // ==========================
                        // TikTok Purchase
                        // ==========================
                        if (typeof ttq !== 'undefined' && ttq) {
                            console.log("TikTok Purchase");

                            ttq.track('Purchase', {
                                contents: [{
                                    content_id: 'SMN-001',
                                    content_name: 'Screen Magnetic Net',
                                    quantity: quantity,
                                    price: price
                                }],
                                value: price,
                                currency: 'NGN'
                            });

                        } else {
                            console.log("TikTok pixel not detected.");
                        }

                        // ==========================
                        // Meta Purchase
                        // ==========================
                        if (typeof fbq === 'function') {
                            console.log("Meta Purchase");

                            fbq('track', 'Purchase', {
                                content_ids: ['SMN-001'],
                                content_type: 'product',
                                content_name: 'Screen Magnetic Net',
                                value: price,
                                currency: 'NGN'
                            });

                        } else {
                            console.log("Meta pixel not detected.");
                        }

                        sessionStorage.setItem(trackingKey, 'true');
                        console.log("Purchase tracked.");

                    } else {
                        console.log("Purchase already tracked.");
                    }

                    // Give tracking requests time to leave the browser
                    setTimeout(function () {
                        redirectToWhatsApp(orderId);
                    }, 1500);

                }, 1200);

            });

        })();
    </script>
    <!-- END Purchase Tracking + WhatsApp Redirect -->
